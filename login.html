<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LabDesk — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0b0f;
      color: #e8eaf0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.18;
      animation: drift 18s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .orb-1 { width: 500px; height: 500px; background: #6c63ff; top: -150px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: #00d4aa; bottom: -100px; right: 0; animation-duration: 24s; animation-delay: -5s; }
    .orb-3 { width: 300px; height: 300px; background: #ff6b6b; top: 40%; left: 40%; animation-duration: 20s; animation-delay: -10s; }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(60px, 40px) scale(1.1); }
    }

    /* Login card */
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 420px;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0.88) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .logo-wrap { margin-bottom: 1.5rem; }
    .logo-icon { font-size: 3rem; display: block; margin-bottom: 0.5rem; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.08); }
    }
    .logo-text {
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(135deg, #6c63ff, #00d4aa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 0.8rem; color: #7a7f96; margin-top: 0.3rem;
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 1.75rem 0; }

    .welcome {
      font-size: 1.1rem; font-weight: 600; margin-bottom: 0.4rem;
    }
    .sub {
      font-size: 0.82rem; color: #7a7f96; margin-bottom: 1.75rem; line-height: 1.5;
    }

    /* Google button */
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 0.85rem 1.5rem;
      background: #fff; color: #3c4043;
      border: none; border-radius: 12px;
      font-size: 0.95rem; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; position: relative; overflow: hidden;
      transition: box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .google-btn:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      transform: translateY(-1px);
    }
    .google-btn:active { transform: translateY(0); }
    .google-btn:disabled {
      opacity: 0.7; cursor: not-allowed; transform: none;
    }
    .google-btn svg { flex-shrink: 0; }

    .spinner {
      display: none; width: 20px; height: 20px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #4285F4;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-msg {
      margin-top: 1rem; font-size: 0.8rem; color: #7a7f96;
      min-height: 1.2rem;
    }
    .status-msg.success { color: #00d4aa; }
    .status-msg.error   { color: #ff6b6b; }

    .footer-note {
      margin-top: 2rem; font-size: 0.72rem; color: #4a4f66;
      line-height: 1.6;
    }
    .footer-note a { color: #6c63ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="card">
    <div class="logo-wrap">
      <span class="logo-icon">⚡</span>
      <div class="logo-text">LabDesk</div>
      <div class="tagline">Engineering Lab Dashboard</div>
    </div>

    <div class="divider"></div>

    <div class="welcome">Welcome back, Engineer 👋</div>
    <div class="sub">
      Sign in with your Google account to access all your tools —
      Gmail, Drive, YouTube, and more — all in one place.
    </div>

    <button class="google-btn" id="signInBtn" onclick="doLogin()">
      <!-- Official Google G logo -->
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      <span id="btnText">Sign in with Google</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="status-msg" id="statusMsg"></div>

    <div class="footer-note">
      🔒 Your credentials are handled entirely by Google.<br/>
      LabDesk never sees or stores your password.
    </div>
  </div>

  <script>
    async function doLogin() {
      const btn     = document.getElementById('signInBtn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const status  = document.getElementById('statusMsg');

      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent   = 'Opening Google Sign-In…';
      status.textContent    = 'The main window will navigate to Google. Sign in and you\'ll be brought back automatically.';
      status.className      = 'status-msg';

      // Fire and forget — main process navigates the whole window to Google
      if (window.labdesk) {
        window.labdesk.login();
      }
    }
  </script>
</body>
</html>
